<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration_Page </title>
    <link rel="stylesheet" href="registration.css">
</head>
<body>
    <form >
        
            <fieldset id="fieldset">
               <h1><b>Registration Page</b></h1>
                <br>
                <div id="">
                    <label for="name">UserName : </label>
                    <input type="text" id="name" placeholder="Enter User Name"> <br>
                    <br>
                    <label for="roll number">Roll Number : </label>
                    <input type="text" id="roll number" placeholder="Enter Roll NUmber">
                    <br>
                    <br>
                    <label for="email">Email : </label>
                    <input type="email" id="email" placeholder="Eg : xyz@gmail.com">
                    <br>
                    <br>
                    <label for="gender"> Gender :</label>

                    <input type="radio" name="gender" id="male">Male
                    <!-- <br> -->
                    <input type="radio" name="gender" id="female"> Female
                    <br>
                    <br>
                    <label for="dob"> DOB : </label>
                    <input type="date" id="dob">

                </div><br>
                <div id="footer">
                    <label for="phno">Phone Number : </label>
                    <input type="number" id="number">
                    <br>
                    <br>
                    <input type="checkbox"> privacy policies and security

                </div>
                <br>
                <div id="button">
                    <button>Register</button>
                </div>

            </fieldset>
       
    </form>
</body>
</html>
